<!DOCTYPE html>
<html dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title> Certificates System | Eduneers </title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');

    :root {
      --primary: #0f172a;
      --primary-light: #1e293b;
      --accent: #f5b041;
      --accent-glow: rgba(245, 176, 65, 0.6);
      --electric-blue: #00d2ff;
      --electric-glow: rgba(0, 210, 255, 0.5);
      --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      --text-main: #334155;
      --text-muted: #64748b;
      --card-bg: rgba(255, 255, 255, 0.9);
      --border-radius: 24px;
    }

    body.dark-mode {
      --primary: #f8fafc;
      --bg-gradient: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
      --text-main: #f8fafc;
      --text-muted: #cbd5e1;
      --card-bg: rgba(15, 23, 42, 0.9);
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-gradient);
      margin: 0;
      color: var(--text-main);
      min-height: 100vh;
      transition: background 0.5s, color 0.5s;
      overflow-x: hidden;
    }

    .circuit-bg {
      position: fixed;
      top: -5%;
      left: -5%;
      width: 110vw;
      height: 110vh;
      z-index: -1;
      background-image: radial-gradient(circle at 50% 50%, rgba(245, 176, 65, 0.05) 2px, transparent 2px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    body.dark-mode .circuit-bg {
      background-image: radial-gradient(circle at 50% 50%, rgba(0, 210, 255, 0.1) 2px, transparent 3px);
    }

    /* 💎 Navbar */
    .navbar {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(16px);
      color: white;
      padding: 12px 0;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .nav-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      box-sizing: border-box;
    }

    .nav-brand h2 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
    }

    .nav-brand h2 .brand-text {
      background: linear-gradient(to left, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    body.dark-mode .nav-brand h2 .brand-text {
      background: linear-gradient(to left, #fff, var(--electric-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.3s;
      font-size: 1.2rem;
    }

    .nav-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    /* 🏷️ Container */
    .container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 25px;
    }

    @media (max-width: 992px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    /* 🎨 Glass Section */
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border-radius: var(--border-radius);
      padding: 25px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
      margin-bottom: 25px;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--primary);
    }

    body.dark-mode .card-title {
      color: var(--electric-blue);
    }

    /* 🖼️ Designer Area */
    .designer-canvas-container {
      width: 100%;
      background: #000;
      border-radius: 15px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      border: 4px solid var(--primary-light);
      cursor: crosshair;
    }

    canvas {
      width: 100%;
      display: block;
    }

    .canvas-overlay-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.5);
      font-weight: 800;
      text-align: center;
      pointer-events: none;
    }

    /* 🎛️ Controls */
    .controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .control-item label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-muted);
    }

    input[type="text"],
    input[type="number"],
    input[type="color"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 2px solid transparent;
      background: rgba(0,0,0,0.05);
      color: var(--text-main);
      font-family: 'Cairo';
      font-weight: 700;
      outline: none;
      transition: 0.3s;
    }

    body.dark-mode input,
    body.dark-mode select,
    body.dark-mode textarea {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.1);
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    /* 🚀 Buttons */
    .btn {
      padding: 14px 25px;
      border-radius: 14px;
      border: none;
      font-family: 'Cairo';
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.3s;
    }

    .btn-primary {
      background: var(--accent);
      color: #0f172a;
      width: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px var(--accent-glow);
    }

    .btn-secondary {
      background: var(--primary-light);
      color: white;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--text-main);
    }

    .btn-whatsapp {
      background: #25d366;
      color: white;
    }

    .btn-email {
      background: #ea4335;
      color: white;
    }

    .btn-drive {
      background: linear-gradient(135deg, #4285f4, #34a853);
      color: white;
    }

    /* 📋 Student List */
    .student-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: rgba(0,0,0,0.02);
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid rgba(0,0,0,0.05);
    }

    body.dark-mode .student-item {
      background: rgba(255,255,255,0.02);
      border-color: rgba(255,255,255,0.05);
    }

    .student-info { display: flex; flex-direction: column; overflow: hidden; }
    .student-name { font-weight: 800; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .student-contact { font-size: 0.75rem; color: var(--text-muted); }

    /* 🛰️ Send Monitor Modal */
    .monitor-modal {
      position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(15px); z-index: 10000; display: none;
      align-items: center; justify-content: center;
    }

    .monitor-content {
      width: 90%; max-width: 600px; background: var(--card-bg);
      border-radius: 30px; padding: 30px; border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }

    .monitor-list {
      max-height: 400px; overflow-y: auto; margin-top: 20px;
      padding-right: 5px;
    }

    .monitor-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    body.dark-mode .monitor-row { border-bottom-color: rgba(255,255,255,0.05); }

    .status-badge { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 800; }
    .status-pending { background: rgba(245, 176, 65, 0.1); color: var(--accent); }
    .status-sending { background: rgba(0, 210, 255, 0.1); color: var(--electric-blue); animation: pulse 1s infinite; }
    .status-success { background: rgba(16, 185, 129, 0.1); color: #10b981; }
    .status-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

    .progress-bar-container {
      width: 100%; height: 8px; background: rgba(0,0,0,0.1);
      border-radius: 10px; overflow: hidden; margin: 15px 0;
    }

    .progress-fill { height: 100%; width: 0%; background: var(--electric-blue); transition: 0.3s; }

    @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
  </style>
</head>

<body class="dark-mode">
  <div class="circuit-bg"></div>

  <!-- 📊 Live Send Monitor Modal -->
  <div class="monitor-modal" id="sendMonitor">
    <div class="monitor-content">
      <div class="card-title">
        <span id="monitorIcon">🚀</span> 
        <span id="monitorTitle">جاري العمل...</span>
      </div>
      
      <div class="progress-bar-container">
        <div class="progress-fill" id="overallProgress"></div>
      </div>
      
      <div style="display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 800;">
        <span id="monitorCount">متابعة: 0 / 0</span>
        <span id="monitorPercent">0%</span>
      </div>

      <div class="monitor-list" id="monitorList"></div>

      <div style="margin-top: 25px; display: none;" id="monitorActions">
        <button class="btn btn-primary" onclick="closeMonitor()">إغلاق النافذة ✅</button>
      </div>
    </div>
  </div>

  <nav class="navbar">
    <div class="nav-content">
      <div class="nav-brand">
        <a href="index.html" style="text-decoration: none;">
          <h2>⚡ <span class="brand-text">Eduneers</span> | الشهادات 🎓</h2>
        </a>
      </div>
      <div class="nav-actions">
        <div class="nav-btn" onclick="toggleTheme()" id="themeBtn">🌙</div>
        <a href="index.html" class="nav-btn" title="الرئيسية">🏠</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <main>
      <section class="glass-card">
        <div class="card-title"><span>🎨</span> تصميم قالب الشهادة</div>
        <div style="margin-bottom: 20px;">
          <label for="templateUpload" class="btn btn-outline" style="cursor: pointer;">📤 ارفع قالب الشهادة (صورة)</label>
          <input type="file" id="templateUpload" accept="image/*" style="display: none;" onchange="handleTemplateUpload(this)">
        </div>
        <div class="designer-canvas-container">
          <canvas id="certCanvas"></canvas>
          <div class="canvas-overlay-text" id="canvasHint">ارفع الشهادة ثم اضغط لتحديد المكان</div>
        </div>
        <div class="controls-grid">
          <div class="control-item"><label>حجم الخط</label><input type="number" id="fontSize" value="50" oninput="updatePreview()"></div>
          <div class="control-item"><label>لون الخط</label><input type="color" id="textColor" value="#000000" oninput="updatePreview()"></div>
          <div class="control-item"><label>نوع الخط</label><select id="fontFamily" onchange="updatePreview()"><option value="Cairo">Cairo</option><option value="Arial">Arial</option><option value="Amiri">Amiri</option></select></div>
          <div class="control-item"><label>الوزن</label><select id="fontWeight" onchange="updatePreview()"><option value="normal">عادي</option><option value="bold" selected>Bold</option></select></div>
        </div>
      </section>

      <section class="glass-card" id="resultsSection" style="display: none;">
        <div class="card-title"><span>✨</span> الشهادات الجاهزة</div>
        <div id="resultsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px;"></div>
        <div style="margin-top: 20px; display: flex; flex-wrap: wrap; gap: 10px;">
          <button class="btn btn-primary" onclick="downloadAllZip()">📥 تحميل ZIP</button>
          <button class="btn btn-email" onclick="sendAllEmails()">📧 إرسال الكل إيميل</button>
          <button class="btn btn-drive" onclick="uploadAllToDrive()">📁 رفع للـ Drive</button>
        </div>
      </section>
    </main>

    <aside>
      <section class="glass-card">
        <div class="card-title"><span>📋</span> قائمة الأسماء</div>
        <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 10px;">انسخ الأعمدة: (الكود، الاسم، الرابط) من الشيت</p>
        <textarea id="dataInput" rows="12" placeholder="الصق البيانات هنا..." oninput="parseInput()"></textarea>
        <div id="parsedCount" style="font-weight: 800; font-size: 0.9rem; margin: 10px 0; color: var(--accent);">متدربين: 0</div>
        <button class="btn btn-primary" onclick="generateAll()">⚡ إنشاء الشهادات</button>
        <div id="studentListContainer" style="margin-top: 20px; max-height: 400px; overflow-y: auto;"></div>
      </section>
    </aside>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbweoB5KiIMQPCVwIMir0O4z55Ae0mtdPxSNJi1FvcarbuStZQJkh9AaN-famWpG8wWXCg/exec";
    let templateImg = null, nameX = 0, nameY = 0, students = [], generatedCerts = [];
    const canvas = document.getElementById('certCanvas'), ctx = canvas.getContext('2d');

    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('themeBtn').innerText = isDark ? '🌙' : '☀️';
      updatePreview();
    }

    function handleTemplateUpload(input) {
      const file = input.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        templateImg = new Image();
        templateImg.onload = () => {
          canvas.width = templateImg.width; canvas.height = templateImg.height;
          nameX = canvas.width/2; nameY = canvas.height/2;
          document.getElementById('canvasHint').style.display = 'none'; updatePreview();
        };
        templateImg.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    canvas.onclick = (e) => {
      if (!templateImg) return;
      const rect = canvas.getBoundingClientRect(), sx = canvas.width/rect.width, sy = canvas.height/rect.height;
      nameX = (e.clientX - rect.left) * sx; nameY = (e.clientY - rect.top) * sy; updatePreview();
    };

    function updatePreview() {
      if (!templateImg) return;
      ctx.drawImage(templateImg, 0, 0);
      const fs = document.getElementById('fontSize').value, col = document.getElementById('textColor').value, ff = document.getElementById('fontFamily').value, fw = document.getElementById('fontWeight').value;
      ctx.fillStyle = col; ctx.font = `${fw} ${fs}px ${ff}`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText("الاسم هنا", nameX, nameY);
      ctx.strokeStyle = 'rgba(255,0,0,0.5)'; ctx.strokeRect(nameX-10, nameY-10, 20, 20);
    }

    function parseInput() {
      const text = document.getElementById('dataInput').value.trim();
      const lines = text.split('\n').filter(l => l.trim() !== "");
      students = lines.map(line => {
        const p = line.split(/[,\t]/);
        if (p.length >= 4) return { code: p[1].trim(), name: p[2].trim(), driveLink: p[3].trim() };
        if (p.length === 3) return { code: p[0].trim(), name: p[1].trim(), driveLink: p[2].trim() };
        return { code: "N/A", name: p[0].trim(), driveLink: p[1] || "" };
      });
      document.getElementById('parsedCount').innerText = `متدربين: ${students.length}`;
      renderList();
    }

    function renderList() {
      document.getElementById('studentListContainer').innerHTML = students.map((s, i) => `
        <div class="student-item">
          <div class="student-info"><b>${s.name}</b><br><small>${s.code}</small></div>
          <button class="btn btn-outline" style="padding:5px 10px;" onclick="uploadSingle(${i})">📁</button>
        </div>
      `).join('');
    }

    async function generateAll() {
      if(!templateImg) return alert("ارفع القالب");
      generatedCerts = []; 
      const grid = document.getElementById('resultsGrid'); grid.innerHTML = "";
      document.getElementById('resultsSection').style.display = 'block';
      const fs = document.getElementById('fontSize').value, col = document.getElementById('textColor').value, ff = document.getElementById('fontFamily').value, fw = document.getElementById('fontWeight').value;

      for (let i = 0; i < students.length; i++) {
        const s = students[i], off = document.createElement('canvas');
        off.width = templateImg.width; off.height = templateImg.height;
        const octx = off.getContext('2d');
        octx.drawImage(templateImg, 0, 0); octx.fillStyle = col; octx.font = `${fw} ${fs}px ${ff}`; octx.textAlign = 'center'; octx.textBaseline = 'middle';
        octx.fillText(s.name, nameX, nameY);
        const url = off.toDataURL('image/jpeg', 0.9);
        generatedCerts.push({ ...s, dataUrl: url });
        grid.innerHTML += `<div style="text-align:center"><img src="${url}" style="width:100%; border-radius:10px;"><br><small>${s.name}</small></div>`;
      }
    }

    function extractFolderId(url) {
      if (!url) return null;
      const match = url.match(/[-\w]{25,}/);
      return match ? match[0] : null;
    }

    async function uploadSingle(index, isBulk = false) {
      const cert = generatedCerts[index];
      const folderId = extractFolderId(cert.driveLink);
      if(!folderId) { if(!isBulk) alert("رابط الدرايف غير صحيح"); return false; }
      
      const rowId = `status-${index}`;
      if(isBulk) updateStatus(rowId, 'sending', 'جاري الرفع...');

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({
            action: "uploadToDrive",
            folderId: folderId,
            filename: `${cert.code}.jpg`,
            fileData: cert.dataUrl.split(',')[1]
          })
        });
        const d = await res.json();
        if(d.status === 'success') {
          if(isBulk) updateStatus(rowId, 'success', 'تم الرفع ✅');
          else alert("تم الرفع بنجاح!");
          return true;
        } else {
          if(isBulk) updateStatus(rowId, 'error', 'خطأ في الرفع');
          return false;
        }
      } catch (e) {
        if(isBulk) updateStatus(rowId, 'error', 'عطل اتصال');
        return false;
      }
    }

    async function uploadAllToDrive() {
      if(generatedCerts.length === 0) return;
      document.getElementById('sendMonitor').style.display = 'flex';
      const list = document.getElementById('monitorList');
      list.innerHTML = generatedCerts.map((c, i) => `<div class="monitor-row"><span>${c.name}</span><span class="status-badge status-pending" id="status-${i}">انتظار</span></div>`).join('');
      
      for(let i=0; i<generatedCerts.length; i++) {
        await uploadSingle(i, true);
        const p = Math.round(((i+1)/generatedCerts.length)*100);
        document.getElementById('overallProgress').style.width = p+'%';
        document.getElementById('monitorPercent').innerText = p+'%';
        document.getElementById('monitorCount').innerText = `تم: ${i+1} / ${generatedCerts.length}`;
        await new Promise(r => setTimeout(r, 300));
      }
      document.getElementById('monitorActions').style.display = 'block';
      document.getElementById('monitorTitle').innerText = "تم الرفع للدرايف!";
    }

    async function sendAllEmails() {
      if(generatedCerts.length === 0) return;
      document.getElementById('sendMonitor').style.display = 'flex';
      const list = document.getElementById('monitorList');
      list.innerHTML = generatedCerts.map((c, i) => `<div class="monitor-row"><span>${c.name}</span><span class="status-badge status-pending" id="status-${i}">انتظار</span></div>`).join('');
      
      for(let i=0; i<generatedCerts.length; i++) {
        const cert = generatedCerts[i];
        const rowId = `status-${i}`;
        updateStatus(rowId, 'sending', 'إرسال...');
        try {
          const res = await fetch(API_URL, {
            method: "POST", body: JSON.stringify({
              action: "sendBroadcast", target: cert.driveLink.includes('@') ? cert.driveLink : "test@example.com", 
              subject: `شهادة - ${cert.name}`, body: "مرفق شهادتك",
              attachment: { data: cert.dataUrl.split(',')[1], mimeType: "image/jpeg", filename: "cert.jpg" }
            })
          });
          updateStatus(rowId, 'success', 'تم ✅');
        } catch(e) { updateStatus(rowId, 'error', 'خطأ'); }
        await new Promise(r => setTimeout(r, 500));
      }
      document.getElementById('monitorActions').style.display = 'block';
    }

    function updateStatus(id, type, text) { const el = document.getElementById(id); if(el) { el.className = `status-badge status-${type}`; el.innerText = text; } }
    function closeMonitor() { document.getElementById('sendMonitor').style.display = 'none'; document.getElementById('monitorActions').style.display = 'none'; }
    function downloadAllZip() { const zip = new JSZip(); generatedCerts.forEach(c => { const b = atob(c.dataUrl.split(',')[1]), a = new Uint8Array(b.length); for(let i=0; i<b.length; i++) a[i]=b.charCodeAt(i); zip.file(`${c.code}.jpg`, new Blob([a], {type:'image/jpeg'})); }); zip.generateAsync({type:"blob"}).then(b => saveAs(b, "Certs.zip")); }
  </script>
</body>
</html>
