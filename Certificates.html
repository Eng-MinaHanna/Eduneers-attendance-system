<!DOCTYPE html>
<html dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title> Eduneers | Enterprise Certificates </title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');

    :root {
      --primary: #0f172a; --primary-light: #1e293b; --accent: #f5b041; --accent-glow: rgba(245, 176, 65, 0.6);
      --electric-blue: #00d2ff; --electric-glow: rgba(0, 210, 255, 0.5); --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      --text-main: #334155; --text-muted: #64748b; --card-bg: rgba(255, 255, 255, 0.9); --border-radius: 20px;
    }

    body.dark-mode {
      --primary: #f8fafc; --bg-gradient: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
      --text-main: #f8fafc; --text-muted: #cbd5e1; --card-bg: rgba(15, 23, 42, 0.95);
    }

    body { font-family: 'Cairo', sans-serif; background: var(--bg-gradient); margin: 0; color: var(--text-main); min-height: 100vh; overflow-x: hidden; transition: 0.3s; }
    .circuit-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.1; background-image: radial-gradient(var(--accent) 1px, transparent 1px); background-size: 30px 30px; }

    .navbar { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); color: white; padding: 15px 0; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .nav-content { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }

    .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
    @media (max-width: 992px) { .container { grid-template-columns: 1fr; } }

    .glass-card { background: var(--card-bg); border-radius: var(--border-radius); padding: 25px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .card-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

    .designer-box { width: 100%; background: #000; border-radius: 15px; position: relative; overflow: hidden; border: 3px solid var(--primary-light); cursor: crosshair; }
    canvas { width: 100%; display: block; }

    .manager-only { display: none; }
    body.role-admin .manager-only, body.role-co-founder .manager-only, body.role-owner .manager-only { display: block !important; }

    input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: rgba(0,0,0,0.02); color: var(--text-main); font-family: 'Cairo'; font-weight: 700; outline: none; transition: 0.3s; box-sizing: border-box; }
    body.dark-mode input, body.dark-mode select, body.dark-mode textarea { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
    input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

    .btn { padding: 12px 20px; border-radius: 12px; border: none; font-family: 'Cairo'; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background: var(--accent); color: #0f172a; }
    .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--text-main); }
    .btn-drive { background: #34a853; color: white; }
    .btn-email { background: #ea4335; color: white; }

    .status-monitor { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; }
    .monitor-card { width: 90%; max-width: 500px; background: var(--card-bg); border-radius: 25px; padding: 30px; }
    
    .loading-spinner { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .lock-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(2px); display: none; align-items: center; justify-content: center; color: white; font-weight: 900; pointer-events: none; z-index: 5; }
  </style>
</head>

<body class="dark-mode">
  <div class="circuit-bg"></div>

  <div class="status-monitor" id="monitor">
    <div class="monitor-card">
      <div class="card-title">🚀 <span id="mTitle">جاري المعالجة...</span></div>
      <div id="mList" style="max-height: 300px; overflow-y: auto; font-size: 13px;"></div>
      <button class="btn btn-primary" style="width: 100%; margin-top: 20px;" onclick="closeMonitor()">إغلاق</button>
    </div>
  </div>

  <nav class="navbar">
    <div class="nav-content">
      <div style="font-size: 1.4rem; font-weight: 900;">🎓 <span style="color:var(--accent)">EDuneers</span> | Certificates</div>
      <a href="index.html" class="btn btn-outline" style="padding: 6px 15px; font-size: 13px;">🏠 الرئيسية</a>
    </div>
  </nav>

  <div class="container">
    <main>
      <section class="glass-card">
        <div class="card-title">🎨 مصمم القوالب الذكي</div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
          <select id="templateSelect" onchange="loadTemplate(this.value)">
            <option value="">-- اختر قالباً جاهزاً من الشيت --</option>
          </select>
          <button class="btn btn-outline" onclick="fetchTemplates()" title="تحديث القوالب">🔄</button>
        </div>

        <div class="manager-only" style="margin-bottom: 20px; border: 1px dashed var(--accent); padding: 15px; border-radius: 15px; background: rgba(245, 176, 65, 0.05);">
          <div style="display: grid; grid-template-columns: 1fr auto; gap: 10px;">
            <input type="text" id="tplName" placeholder="اسم القالب الجديد (مثلاً: دفعة مارس)">
            <button class="btn btn-primary" onclick="saveTemplate()">💾 حفظ كقالب جديد</button>
          </div>
          <label for="tplFile" class="btn btn-outline" style="margin-top: 10px; width: 100%; cursor: pointer;">📤 ارفع صورة خلفية للشهادة</label>
          <input type="file" id="tplFile" accept="image/*" style="display:none" onchange="previewFile(this)">
        </div>

        <div class="designer-box">
          <canvas id="canvas"></canvas>
          <div class="lock-overlay" id="lock">🔐 القالب مقفل من الإدارة</div>
        </div>

        <div class="manager-only" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
          <div><label style="font-size:11px">حجم الخط</label><input type="number" id="fSize" value="60" oninput="draw()"></div>
          <div><label style="font-size:11px">لون الخط</label><input type="color" id="fColor" value="#000000" oninput="draw()"></div>
        </div>
      </section>

      <section class="glass-card" id="resultsBox" style="display:none">
        <div class="card-title">✨ الشهادات المولدة</div>
        <div id="grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px;"></div>
        <div style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
          <button class="btn btn-primary" onclick="zipIt()">📥 تحميل ZIP</button>
          <button class="btn btn-drive" onclick="bulkDrive()">📁 رفع للدرايف</button>
          <button class="btn btn-email" onclick="bulkEmail()">📧 إرسال إيميل</button>
        </div>
      </section>
    </main>

    <aside>
      <section class="glass-card">
        <div class="card-title">📋 بيانات المتدربين</div>
        <p style="font-size: 11px; color: var(--text-muted);">لصق: الكود | الاسم | رابط المجلد</p>
        <textarea id="input" rows="15" placeholder="الصق هنا..." oninput="parse()"></textarea>
        <div id="count" style="text-align: center; font-weight: 800; margin: 10px 0; color: var(--accent);">0 طلاب</div>
        <button class="btn btn-primary" style="width: 100%;" onclick="run()">⚡ ابدأ الإنشاء</button>
      </section>
    </aside>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbyrWS8X3nzSZee23xrAWqtISRm8wZttvVaHZHVSv0mpU0RJ7lvEQBlMiLbVyFhnfagBRw/exec";
    let bg = null, nX = 0, nY = 0, data = [], certs = [], tpls = [];
    const cvs = document.getElementById('canvas'), ctx = cvs.getContext('2d');

    // 🔒 Permissions
    const checkRoles = () => {
      const r = localStorage.getItem('userRole');
      const isM = (r === 'Owner' || r === 'CO-Founder' || r === 'Team Manager' || r === 'Admin');
      document.body.className = `dark-mode role-${isM ? 'admin' : 'manager'}`;
      document.getElementById('lock').style.display = isM ? 'none' : 'flex';
    };

    // 🌐 Templates Logic
    async function fetchTemplates() {
      try {
        const r = await fetch(API, { method: "POST", body: JSON.stringify({ action: "getTemplates" }) });
        const d = await r.json(); tpls = d.templates;
        const s = document.getElementById('templateSelect');
        s.innerHTML = '<option value="">-- اختر قالباً جاهزاً من الشيت --</option>';
        tpls.forEach((t, i) => s.innerHTML += `<option value="${i}">${t.name}</option>`);
      } catch(e) { console.error(e); }
    }

    function loadTemplate(idx) {
      if (idx==="") return; 
      const t = tpls[idx];
      document.getElementById('fSize').value = t.settings.fSize;
      document.getElementById('fColor').value = t.settings.fColor;
      nX = t.settings.nX; nY = t.settings.nY;
      
      bg = new Image(); bg.crossOrigin = "anonymous";
      // تحويل رابط الدرايف لرابط مباشر للصورة للتحميل في الكانفاس
      const fileId = t.fileId;
      bg.onload = () => { cvs.width = bg.width; cvs.height = bg.height; draw(); };
      bg.src = `https://lh3.googleusercontent.com/u/0/d/${fileId}=w2000`;
    }

    async function saveTemplate() {
      const name = document.getElementById('tplName').value.trim();
      if (!name || !bg) return alert("الاسم والصورة مطلوبان");
      
      const set = { nX, nY, fSize: document.getElementById('fSize').value, fColor: document.getElementById('fColor').value };
      showMonitor("جاري حفظ القالب ورفعه للدرايف ⏳...");

      try {
        const r = await fetch(API, { method: "POST", body: JSON.stringify({ action: "saveTemplate", name, settings: set, imageData: bg.src.split(',')[1] }) });
        const d = await r.json();
        if(d.status === 'success') { alert("✅ تم الحفظ بنجاح!"); fetchTemplates(); }
        else alert("❌ خطأ: " + d.message);
      } catch(e) { alert("❌ خطأ اتصال"); }
      closeMonitor();
    }

    // 🖌️ Canvas Interaction
    let drag = false;
    cvs.onmousedown = (e) => { if(document.body.classList.contains('role-admin')) { drag = true; pos(e); } };
    cvs.onmousemove = (e) => { if(drag) pos(e); };
    cvs.onmouseup = () => drag = false;

    function pos(e) {
      const r = cvs.getBoundingClientRect(), sx = cvs.width/r.width, sy = cvs.height/r.height;
      nX = (e.clientX - r.left) * sx; nY = (e.clientY - r.top) * sy; draw();
    }

    function draw() {
      if(!bg) return;
      ctx.drawImage(bg, 0, 0);
      ctx.setLineDash([5, 5]); ctx.strokeStyle = "rgba(0,210,255,0.4)";
      ctx.beginPath(); ctx.moveTo(cvs.width/2, 0); ctx.lineTo(cvs.width/2, cvs.height); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = document.getElementById('fColor').value;
      const fs = document.getElementById('fSize').value;
      ctx.font = `bold ${fs}px Cairo`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText("اسم المتدرب هنا", nX, nY);
    }

    function previewFile(i) {
      const f = i.files[0]; if(!f) return;
      const r = new FileReader();
      r.onload = (e) => {
        bg = new Image();
        bg.onload = () => { cvs.width = bg.width; cvs.height = bg.height; nX = cvs.width/2; nY = cvs.height/2; draw(); };
        bg.src = e.target.result;
      };
      r.readAsDataURL(f);
    }

    // ⚡ Logic
    function parse() {
      const l = document.getElementById('input').value.trim().split('\n').filter(x => x.trim());
      data = l.map(row => {
        const p = row.split(/[,\t]/);
        if (p.length >= 4) return { code: p[1].trim(), name: p[2].trim(), link: p[3].trim() };
        if (p.length === 3) return { code: p[0].trim(), name: p[1].trim(), link: p[2].trim() };
        return { code: "N/A", name: p[0].trim(), link: p[1] || "" };
      });
      document.getElementById('count').innerText = `${data.length} طلاب`;
    }

    async function run() {
      if(!bg) return alert("اختر قلباً أولاً");
      certs = []; 
      const g = document.getElementById('grid'); g.innerHTML = "";
      document.getElementById('resultsBox').style.display = 'block';
      const fs = document.getElementById('fSize').value, col = document.getElementById('fColor').value;

      data.forEach(s => {
        const o = document.createElement('canvas'); o.width = bg.width; o.height = bg.height;
        const ox = o.getContext('2d'); ox.drawImage(bg, 0, 0); ox.fillStyle = col; ox.font = `bold ${fs}px Cairo`; ox.textAlign = 'center'; ox.textBaseline = 'middle';
        ox.fillText(s.name, nX, nY);
        const url = o.toDataURL('image/jpeg', 0.9);
        certs.push({ ...s, url });
        g.innerHTML += `<div style="text-align:center"><img src="${url}" style="width:100%; border-radius:10px;"><br><span style="font-size:9px">${s.name}</span></div>`;
      });
    }

    async function bulkDrive() {
      showMonitor("جاري الرفع الشخصي للدرايف 📁...");
      const list = document.getElementById('mList'); list.innerHTML = "";
      for (let i = 0; i < certs.length; i++) {
        const c = certs[i];
        const folderId = c.link.match(/[-\w]{25,}/) ? c.link.match(/[-\w]{25,}/)[0] : null;
        if(folderId) {
          try {
            await fetch(API, { method: "POST", body: JSON.stringify({ action: "uploadToDrive", folderId, filename: `${c.code}.jpg`, fileData: c.url.split(',')[1] }) });
            list.innerHTML += `<div>✅ ${c.name} - تم الرفع</div>`;
          } catch(e) { list.innerHTML += `<div style="color:red">❌ ${c.name} - فشل</div>`; }
        }
      }
      document.getElementById('mTitle').innerText = "اكتمل الرفع!";
    }

    function zipIt() {
      const z = new JSZip();
      certs.forEach(c => {
        const b = atob(c.url.split(',')[1]), a = new Uint8Array(b.length);
        for(let i=0; i<b.length; i++) a[i]=b.charCodeAt(i);
        z.file(`${c.code}.jpg`, new Blob([a], {type:'image/jpeg'}));
      });
      z.generateAsync({type:"blob"}).then(b => saveAs(b, "Eduneers_Certs.zip"));
    }

    function showMonitor(t) { document.getElementById('monitor').style.display = 'flex'; document.getElementById('mTitle').innerText=t; }
    function closeMonitor() { document.getElementById('monitor').style.display = 'none'; }
    window.onload = () => { checkRoles(); fetchTemplates(); };
  </script>
</body>
</html>
